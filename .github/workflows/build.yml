name: Build A133 U-Boot
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt install -y gcc-aarch64-linux-gnu libgnutls28-dev
      - run: make liontron-h-a133l_defconfig
      - run: make CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
      - run: |
          mkdir -p output
          cp spl/u-boot-spl.bin output/
          cp u-boot.bin output/
          ls -la output/
      - uses: actions/upload-artifact@v4
        with:
          name: u-boot-a133
          path: output/
