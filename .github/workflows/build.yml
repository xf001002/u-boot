name: Build A133
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt install -y gcc-arm-none-eabi
      - run: find configs -name "*a133*" -o -name "*A133*" 2>/dev/null
      - run: grep -rl "MACH_SUN50I_A133" configs/ 2>/dev/null || echo "none"
      - run: grep -rl "sun50i.a133" arch/arm/dts/ 2>/dev/null | head -3
